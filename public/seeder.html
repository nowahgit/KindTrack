<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Seeder | KindTrack</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            padding: 2rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .box {
            background: #1e293b;
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            border: 1px solid #334155;
        }

        .log-entry {
            margin: 0.5rem 0;
            font-family: monospace;
            color: #10b981;
        }

        .error {
            color: #ef4444;
        }

        a.btn {
            display: inline-block;
            background: #3b82f6;
            color: white;
            padding: 0.5rem 1rem;
            text-decoration: none;
            border-radius: 6px;
            margin-top: 1rem;
        }
    </style>
</head>

<body>
    <div class="box">
        <h2>🛠️ KindTrack Database Seeder</h2>
        <p>This script will automatically create 1 Admin and 1 User account in your Firebase Auth and Firestore.</p>
        <button id="start-btn"
            style="background:#10b981; color:white; border:none; padding:0.5rem 1rem; border-radius:6px; cursor:pointer;">Start
            Seeder</button>
    </div>
    <div class="box" id="log-box" style="display:none;">
        <h3>Logs:</h3>
        <div id="log"></div>
        <div id="actions" style="display:none;">
            <a href="pages/login.html" class="btn">Go to Login</a>
        </div>
    </div>
    <script type="module" src="js/seeder.js"></script>
</body>

</html>
