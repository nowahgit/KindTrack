<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Activities | KindTrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,200..1000;1,200..1000&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="app-layout">

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <a href="../index.html" class="sidebar-logo">
                <img src="../assets/icons/logo-full-white.png" alt="KindTrack" style="height: 35px; width: auto; object-fit: contain;">
            </a>
            <nav class="sidebar-nav">
                <p class="sidebar-section-label">Main</p>
                <a href="dashboard.html" class="sidebar-item">
                    <i class="fas fa-house"></i> Dashboard
                </a>
                <a href="activity.html" class="sidebar-item active">
                    <i class="fas fa-list-check"></i> My Activities
                </a>
                <a href="community.html" class="sidebar-item">
                    <i class="fas fa-users"></i> Community Feed
                </a>
                <a href="add-kindness.html" class="sidebar-item">
                    <i class="fas fa-plus-circle"></i> Log Kindness
                </a>
                <p class="sidebar-section-label" style="margin-top:1.5rem;">Insights</p>
                <a href="analytics.html" class="sidebar-item"><i class="fas fa-chart-line"></i> Analytics</a>
                <a href="milestones.html" class="sidebar-item"><i class="fas fa-trophy"></i> Milestones</a>
                <a href="leaderboard.html" class="sidebar-item"><i class="fas fa-medal"></i> Leaderboard</a>
            </nav>
            <div class="sidebar-footer">
                <a href="profile.html" style="text-decoration:none; color:inherit;">
                    <div class="sidebar-user" style="display:flex; align-items:center; gap:0.75rem; cursor:pointer; padding:0.5rem; margin:-0.5rem; margin-bottom:0.5rem; border-radius:12px; transition:background 0.2s;" onmouseover="this.style.background='var(--bg-2)'" onmouseout="this.style.background='transparent'">
                        <div class="sidebar-avatar" id="sidebar-avatar">U</div>
                        <div class="sidebar-user-info">
                            <div class="sidebar-user-name" id="sidebar-user-name">Loading...</div>
                            <div class="sidebar-user-role" style="color:var(--primary); font-weight:600; font-size:0.75rem;">Edit Profile <i class="fas fa-angle-right"></i></div>
                        </div>
                    </div>
                </a>
                <button class="sidebar-item" id="logout-btn" style="color:#ef4444;">
                    <i class="fas fa-right-from-bracket" style="color:#ef4444;"></i> Sign Out
                </button>
            </div>
        </aside>

        <div class="app-main">
            <header class="app-header">
                <div class="flex items-center gap-2">
                    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
                    <div>
                        <h1>My Activities</h1>
                        <p>All your logged acts of kindness</p>
                    </div>
                </div>
                <a href="add-kindness.html" class="btn btn-primary" style="padding:0.6rem 1.25rem;font-size:0.875rem;">
                    <i class="fas fa-plus"></i> Log New
                </a>
            </header>

            <div class="app-body">

                <!-- Filter Bar -->
                <div class="filter-bar">
                    <span style="font-size:0.85rem;font-weight:600;color:var(--text-muted);">Filter:</span>
                    <select id="filter-category" class="filter-select">
                        <option value="all">All Categories</option>
                        <option value="Helping Others">🤝 Helping Others</option>
                        <option value="Charity">🎁 Charity</option>
                        <option value="Support">💬 Support</option>
                        <option value="Volunteering">🙋 Volunteering</option>
                        <option value="Encouragement">⭐ Encouragement</option>
                    </select>
                    <span id="activity-count"
                        style="margin-left:auto;font-size:0.82rem;color:var(--text-muted);"></span>
                </div>

                <!-- Activity Grid -->
                <div class="activity-grid" id="activity-grid">
                    <!-- Skeleton loaders -->
                    <div class="activity-card" style="opacity:0.5;">
                        <div class="skeleton"
                            style="height:40px;width:40px;border-radius:var(--r-md);margin-bottom:1rem;"></div>
                        <div class="skeleton" style="height:16px;width:70%;margin-bottom:0.5rem;"></div>
                        <div class="skeleton" style="height:12px;width:90%;margin-bottom:0.35rem;"></div>
                        <div class="skeleton" style="height:12px;width:60%;"></div>
                    </div>
                    <div class="activity-card" style="opacity:0.3;">
                        <div class="skeleton"
                            style="height:40px;width:40px;border-radius:var(--r-md);margin-bottom:1rem;"></div>
                        <div class="skeleton" style="height:16px;width:80%;margin-bottom:0.5rem;"></div>
                        <div class="skeleton" style="height:12px;width:100%;margin-bottom:0.35rem;"></div>
                        <div class="skeleton" style="height:12px;width:50%;"></div>
                    </div>
                    <div class="activity-card" style="opacity:0.15;">
                        <div class="skeleton"
                            style="height:40px;width:40px;border-radius:var(--r-md);margin-bottom:1rem;"></div>
                        <div class="skeleton" style="height:16px;width:60%;margin-bottom:0.5rem;"></div>
                        <div class="skeleton" style="height:12px;width:85%;margin-bottom:0.35rem;"></div>
                        <div class="skeleton" style="height:12px;width:40%;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="sidebar-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99;"
        onclick="closeSidebar()"></div>

    <script>
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        document.getElementById('hamburger')?.addEventListener('click', () => {
            sidebar.classList.toggle('open');
            overlay.style.display = sidebar.classList.contains('open') ? 'block' : 'none';
        });
        function closeSidebar() {
            sidebar.classList.remove('open');
            overlay.style.display = 'none';
        }
    </script>

    <script type="module" src="../js/activity.js"></script>
    <script type="module" src="../js/auth.js"></script>
    <script type="module" src="../js/sidebar-profile.js"></script>

    <!-- Mobile Bottom Navigation -->
    <nav class="mobile-nav">
        <ul class="mobile-nav-list">
            <a href="dashboard.html" class="mobile-nav-item" id="mnav-dashboard">
                <i class="fas fa-house"></i>
                Home
            </a>
            <a href="activity.html" class="mobile-nav-item" id="mnav-activity">
                <i class="fas fa-list-check"></i>
                Acts
            </a>
            <a href="add-kindness.html" class="mobile-nav-item mobile-fab" id="mnav-add">
                <i class="fas fa-plus"></i>
            </a>
            <a href="community.html" class="mobile-nav-item" id="mnav-community">
                <i class="fas fa-users"></i>
                Feed
            </a>
            <a href="profile.html" class="mobile-nav-item" id="mnav-profile">
                <i class="fas fa-user-circle"></i>
                Profile
            </a>
        </ul>
    </nav>

</body>

</html>
