<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesan | KindTrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,200..1000;1,200..1000&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .support-chat-box {
            background: white;
            border-radius: 20px;
            box-shadow: var(--shadow-xl);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 200px);
            max-width: 800px;
            margin: 0 auto;
            border: 1px solid var(--border-light);
        }

        .chat-header {
            padding: 1.5rem;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .chat-messages {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .msg {
            max-width: 80%;
            padding: 0.85rem 1.1rem;
            border-radius: 16px;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .chat-input-area {
            padding: 1.25rem;
            background: white;
            border-top: 1px solid var(--border-light);
            display: flex;
            gap: 0.75rem;
        }

        .chat-input {
            flex: 1;
            border: 1px solid var(--border-light);
            padding: 0.85rem 1rem;
            border-radius: 12px;
            outline: none;
            transition: border 0.2s;
        }

        .chat-input:focus {
            border-color: var(--primary);
        }

        @media screen and (max-width: 768px) {
            .app-body {
                padding: 0 !important;
            }

            .support-chat-box {
                height: calc(100vh - 120px) !important;
                /* adjust for mobile header */
                border-radius: 0 !important;
                border: none !important;
                margin-top: 0 !important;
            }

            .chat-input-area {
                padding: 0.8rem !important;
                padding-bottom: 5rem !important;
                /* Avoid mobile nav overlap */
            }
        }
    </style>
</head>

<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <a href="../index.html" class="sidebar-logo">
                <img src="../assets/icons/logo-full-white.png" alt="KindTrack"
                    style="height: 35px; width: auto; object-fit: contain;">
            </a>
            <nav class="sidebar-nav">
                <p class="sidebar-section-label">Utama</p>
                <a href="dashboard.html" class="sidebar-item"><i class="fas fa-house"></i> Dashboard</a>
                <a href="community.html" class="sidebar-item"><i class="fas fa-users"></i> Komunitas</a>
                <a href="profile.html" class="sidebar-item"><i class="fas fa-user-circle"></i> Profil</a>
            </nav>
        </aside>

        <div class="app-main">
            <header class="app-header">
                <h1>Pesan</h1>
                <p>Mengobrol dengan pengguna dan admin secara real-time.</p>
            </header>

            <div class="app-body">
                <div class="support-chat-box">

                    <!-- View 1: Contact List -->
                    <div id="chat-contact-list-view" style="display:flex; flex-direction:column; height: 100%;">
                        <div class="chat-header">
                            <h2 style="margin:0; font-size:1.2rem;">Semua Kontak</h2>
                        </div>
                        <div style="padding: 1rem; border-bottom: 1px solid var(--border-light);">
                            <input type="text" id="chat-search" class="form-control"
                                placeholder="Cari pengguna berdasarkan nama atau peran..."
                                style="width:100%; padding:0.8rem; border-radius: var(--r-md); border:1px solid var(--border-light); outline:none;">
                        </div>
                        <div id="chat-contacts-container" style="flex:1; overflow-y:auto; background:white;">
                            <!-- Contacts -->
                        </div>
                    </div>

                    <!-- View 2: Active Chat -->
                    <div id="chat-active-view" style="display:none; flex-direction:column; height: 100%;">
                        <div class="chat-header" style="justify-content:space-between;">
                            <div style="display:flex; align-items:center; gap:0.5rem;">
                                <button id="chat-back-btn" class="btn btn-outline"
                                    style="border:none; background:transparent; color:white; padding:0; font-size:1.2rem; cursor:pointer;"><i
                                        class="fas fa-arrow-left"></i></button>
                                <div id="chat-active-avatar"
                                    style="width:40px; height:40px; background:rgba(255,255,255,0.2); border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:700;">
                                    U</div>
                                <div style="margin-left:0.5rem;">
                                    <div id="chat-active-name" style="font-weight:700; font-size:1.1rem;">Nama Pengguna
                                    </div>
                                    <div id="chat-active-role" style="font-size:0.8rem; opacity:0.8;">Peran</div>
                                </div>
                            </div>
                        </div>
                        <div class="chat-messages" id="chat-messages">
                            <!-- Messages -->
                        </div>
                        <form class="chat-input-area" id="chat-form">
                            <input type="text" id="chat-input" class="chat-input" placeholder="Ketik pesan...">
                            <input type="hidden" id="chat-edit-id" value="">
                            <button type="submit" class="btn btn-primary" id="chat-submit-btn"
                                style="padding: 0 1.5rem;">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                            <button type="button" class="btn btn-outline" id="chat-cancel-edit-btn"
                                style="display:none; padding: 0 1.2rem;">
                                <i class="fas fa-times"></i>
                            </button>
                        </form>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- Mobile Bottom Navigation -->
    <nav class="mobile-nav">
        <ul class="mobile-nav-list">
            <a href="dashboard.html" class="mobile-nav-item" id="mnav-dashboard"><i class="fas fa-house"></i>
                Beranda</a>
            <a href="support.html" class="mobile-nav-item" id="mnav-messages"><i class="fas fa-comments"></i>
                Pesan</a>
            <a href="add-kindness.html" class="mobile-nav-item mobile-fab" id="mnav-add"><i class="fas fa-plus"></i></a>
            <a href="community.html" class="mobile-nav-item" id="mnav-community"><i class="fas fa-users"></i> Feed</a>
            <a href="profile.html" class="mobile-nav-item" id="mnav-profile"><i class="fas fa-user-circle"></i>
                Profil</a>
        </ul>
    </nav>

    <script type="module" src="../js/chat.js?v=2"></script>
    <script type="module" src="../js/sidebar-profile.js"></script>
</body>

</html>
