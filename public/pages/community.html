<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Feed | KindTrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,200..1000;1,200..1000&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .feed-container {
            max-width: 680px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .post-card {
            background: white;
            border: 1px solid var(--border-light);
            border-radius: var(--r-xl);
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .post-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .post-author {
            font-weight: 700;
            color: var(--text);
            font-size: 1rem;
        }

        .post-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .post-title {
            font-size: 1.15rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        .post-desc {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .post-photo {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: var(--r-lg);
            margin-bottom: 1rem;
            border: 1px solid var(--border-light);
        }

        .post-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 1rem;
            border-top: 1px solid var(--border-light);
        }

        .post-actions {
            display: flex;
            gap: 1rem;
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
            padding: 0.4rem 0.8rem;
            border-radius: var(--r-full);
            transition: all 0.2s;
            cursor: pointer;
        }

        .action-btn:hover {
            background: var(--bg-2);
            color: var(--primary-dark);
        }

        .action-btn.liked {
            color: #ef4444;
        }

        .action-btn.liked:hover {
            background: #fef2f2;
        }
    </style>
</head>

<body>
    <div class="app-layout">

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <a href="../index.html" class="sidebar-logo">
                <div class="logo-icon"
                    style="width:28px;height:28px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));border-radius:7px;display:flex;align-items:center;justify-content:center;color:white;font-size:0.75rem;flex-shrink:0;">
                    <i class="fas fa-heart"></i>
                </div>
                KindTrack
            </a>
            <nav class="sidebar-nav">
                <p class="sidebar-section-label">Main</p>
                <a href="dashboard.html" class="sidebar-item">
                    <i class="fas fa-house"></i> Dashboard
                </a>
                <a href="activity.html" class="sidebar-item">
                    <i class="fas fa-list-check"></i> My Activities
                </a>
                <a href="community.html" class="sidebar-item active">
                    <i class="fas fa-users"></i> Community Feed
                </a>
                <a href="add-kindness.html" class="sidebar-item">
                    <i class="fas fa-plus-circle"></i> Log Kindness
                </a>
                <p class="sidebar-section-label" style="margin-top:1.5rem;">Insights</p>
                <a href="#" class="sidebar-item"><i class="fas fa-chart-line"></i> Analytics</a>
                <a href="#" class="sidebar-item"><i class="fas fa-trophy"></i> Milestones</a>
                <a href="leaderboard.html" class="sidebar-item"><i class="fas fa-medal"></i> Leaderboard</a>
            </nav>
            <div class="sidebar-footer">
                <a href="profile.html" style="text-decoration:none; color:inherit;">
                    <div class="sidebar-user"
                        style="display:flex; align-items:center; gap:0.75rem; cursor:pointer; padding:0.5rem; margin:-0.5rem; margin-bottom:0.5rem; border-radius:12px; transition:background 0.2s;"
                        onmouseover="this.style.background='var(--bg-2)'"
                        onmouseout="this.style.background='transparent'">
                        <div class="sidebar-avatar" id="sidebar-avatar">U</div>
                        <div class="sidebar-user-info">
                            <div class="sidebar-user-name" id="sidebar-user-name">Loading...</div>
                            <div class="sidebar-user-role"
                                style="color:var(--primary); font-weight:600; font-size:0.75rem;">Edit Profile <i
                                    class="fas fa-angle-right"></i></div>
                        </div>
                    </div>
                </a>
                <button class="sidebar-item" id="logout-btn" style="color:#ef4444;">
                    <i class="fas fa-right-from-bracket" style="color:#ef4444;"></i> Sign Out
                </button>
            </div>
        </aside>

        <div class="app-main">
            <header class="app-header">
                <div class="flex items-center gap-2">
                    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
                    <div>
                        <h1>Community Feed</h1>
                        <p>Get inspired by acts of kindness around the world.</p>
                    </div>
                </div>
                <a href="add-kindness.html" class="btn btn-primary" style="padding:0.6rem 1.25rem;font-size:0.875rem;">
                    <i class="fas fa-plus"></i> Share Yours
                </a>
            </header>

            <div class="app-body">
                <div class="feed-container" id="feed-container">
                    <!-- Skeletons -->
                    <div class="post-card" style="opacity: 0.6;">
                        <div class="post-header">
                            <div class="skeleton" style="width:44px; height:44px; border-radius:50%;"></div>
                            <div>
                                <div class="skeleton" style="width:120px; height:16px; margin-bottom:6px;"></div>
                                <div class="skeleton" style="width:80px; height:12px;"></div>
                            </div>
                        </div>
                        <div class="skeleton" style="width:80%; height:20px; margin-bottom:10px;"></div>
                        <div class="skeleton" style="width:60%; height:16px; margin-bottom:16px;"></div>
                        <div class="skeleton" style="width:100%; height:200px; border-radius:12px;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Mobile overlay -->
    <div id="sidebar-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99;"
        onclick="closeSidebar()"></div>

    <script>
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        document.getElementById('hamburger')?.addEventListener('click', () => {
            sidebar.classList.toggle('open');
            overlay.style.display = sidebar.classList.contains('open') ? 'block' : 'none';
        });
        function closeSidebar() {
            sidebar.classList.remove('open');
            overlay.style.display = 'none';
        }
    </script>
    <script type="module" src="../js/community.js?v=3"></script>
    <script type="module" src="../js/auth.js"></script>
    <script type="module" src="../js/sidebar-profile.js"></script>
</body>

</html>
