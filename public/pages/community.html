<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beranda Komunitas | KindTrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,200..1000;1,200..1000&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .community-grid {
            display: flex;
            gap: 2rem;
            max-width: 1100px;
            margin: 0 auto;
            align-items: flex-start;
        }

        .feed-container {
            flex: 1;
            max-width: 680px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            width: 100%;
        }

        .desktop-chat-container {
            width: 320px;
            position: sticky;
            top: 6rem;
        }

        .chat-widget {
            background: white;
            border-radius: var(--r-xl);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 550px;
        }

        .chat-widget-header {
            padding: 1rem;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 700;
        }

        .chat-messages {
            flex: 1;
            padding: 1.25rem;
            overflow-y: auto;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
        }

        .msg {
            max-width: 85%;
            padding: 0.65rem 0.9rem;
            border-radius: 12px;
            font-size: 0.85rem;
            line-height: 1.4;
        }

        .msg-admin {
            align-self: flex-start;
            background: white;
            border: 1px solid var(--border-light);
            border-bottom-left-radius: 2px;
            color: var(--text);
        }

        .msg-user {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .chat-input-area {
            padding: 1rem;
            background: white;
            border-top: 1px solid var(--border-light);
            display: flex;
            gap: 0.5rem;
        }

        .chat-input {
            flex: 1;
            border: 1px solid var(--border-light);
            padding: 0.65rem 1rem;
            border-radius: var(--r-full);
            outline: none;
            transition: border 0.2s;
            font-size: 0.85rem;
        }

        .chat-input:focus {
            border-color: var(--primary);
        }

        .mobile-chat-btn {
            display: none;
            text-align: center;
            padding: 0.8rem;
            border-radius: var(--r-md);
            margin-bottom: 1.5rem;
            font-weight: 700;
        }

        .post-card {
            background: white;
            border: 1px solid var(--border-light);
            border-radius: var(--r-xl);
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .post-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .post-author {
            font-weight: 700;
            color: var(--text);
            font-size: 1rem;
        }

        .post-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .post-title {
            font-size: 1.15rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        .post-desc {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .post-photo {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: var(--r-lg);
            margin-bottom: 1rem;
            border: 1px solid var(--border-light);
        }

        .post-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 1rem;
            border-top: 1px solid var(--border-light);
        }

        .post-actions {
            display: flex;
            gap: 1rem;
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
            padding: 0.4rem 0.8rem;
            border-radius: var(--r-full);
            transition: all 0.2s;
            cursor: pointer;
        }

        .action-btn:hover {
            background: var(--bg-2);
            color: var(--primary-dark);
        }

        .action-btn.liked {
            color: #ef4444;
        }

        .action-btn.liked:hover {
            background: #fef2f2;
        }

        @media screen and (max-width: 1024px) {
            .desktop-chat-container {
                display: none;
            }

            .feed-container {
                max-width: 100%;
            }

            .mobile-chat-btn {
                display: block !important;
            }
        }
    </style>
</head>

<body>
    <div class="app-layout">

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <a href="../index.html" class="sidebar-logo">
                <img src="../assets/icons/logo-full-white.png" alt="KindTrack"
                    style="height: 35px; width: auto; object-fit: contain;">
            </a>
            <nav class="sidebar-nav">
                <p class="sidebar-section-label">Utama</p>
                <a href="dashboard.html" class="sidebar-item">
                    <i class="fas fa-house"></i> Dashboard
                </a>
                <a href="activity.html" class="sidebar-item">
                    <i class="fas fa-list-check"></i> Aktivitas Saya
                </a>
                <a href="community.html" class="sidebar-item active">
                    <i class="fas fa-users"></i> Beranda Komunitas
                </a>
                <a href="add-kindness.html" class="sidebar-item">
                    <i class="fas fa-plus-circle"></i> Catat Kebaikan
                </a>
                <p class="sidebar-section-label" style="margin-top:1.5rem;">Wawasan</p>
                <a href="analytics.html" class="sidebar-item"><i class="fas fa-chart-line"></i> Analisis</a>
                <a href="milestones.html" class="sidebar-item"><i class="fas fa-trophy"></i> Pencapaian</a>
                <a href="leaderboard.html" class="sidebar-item"><i class="fas fa-medal"></i> Papan Peringkat</a>
            </nav>
            <div class="sidebar-footer">
                <a href="profile.html" style="text-decoration:none; color:inherit;">
                    <div class="sidebar-user"
                        style="display:flex; align-items:center; gap:0.75rem; cursor:pointer; padding:0.5rem; margin:-0.5rem; margin-bottom:0.5rem; border-radius:12px; transition:background 0.2s;"
                        onmouseover="this.style.background='var(--bg-2)'"
                        onmouseout="this.style.background='transparent'">
                        <div class="sidebar-avatar" id="sidebar-avatar">U</div>
                        <div class="sidebar-user-info">
                            <div class="sidebar-user-name" id="sidebar-user-name">Memuat...</div>
                            <div class="sidebar-user-role"
                                style="color:var(--primary); font-weight:600; font-size:0.75rem;">Edit Profil <i
                                    class="fas fa-angle-right"></i></div>
                        </div>
                    </div>
                </a>
                <button class="sidebar-item" id="logout-btn" style="color:#ef4444;">
                    <i class="fas fa-right-from-bracket" style="color:#ef4444;"></i> Keluar
                </button>
            </div>
        </aside>

        <div class="app-main">
            <header class="app-header">
                <div class="flex items-center gap-2">
                    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
                    <div>
                        <h1>Beranda Komunitas</h1>
                        <p>Terinspirasi oleh aksi kebaikan di seluruh dunia.</p>
                    </div>
                </div>
                <a href="add-kindness.html" class="btn btn-primary" style="padding:0.6rem 1.25rem;font-size:0.875rem;">
                    <i class="fas fa-plus"></i> Bagikan Milikmu
                </a>
            </header>

            <div class="app-body">
                <div class="community-grid">
                    <div class="feed-container" id="feed-container">
                        <a href="support.html" class="btn btn-primary mobile-chat-btn">
                            <i class="fas fa-comments"></i> Pesan
                        </a>

                        <!-- Skeletons -->
                        <div class="post-card" style="opacity: 0.6;">
                            <div class="post-header">
                                <div class="skeleton" style="width:44px; height:44px; border-radius:50%;"></div>
                                <div>
                                    <div class="skeleton" style="width:120px; height:16px; margin-bottom:6px;"></div>
                                    <div class="skeleton" style="width:80px; height:12px;"></div>
                                </div>
                            </div>
                            <div class="skeleton" style="width:80%; height:20px; margin-bottom:10px;"></div>
                            <div class="skeleton" style="width:60%; height:16px; margin-bottom:16px;"></div>
                            <div class="skeleton" style="width:100%; height:200px; border-radius:12px;"></div>
                        </div>
                    </div>

                    <!-- Desktop Chat Widget -->
                    <div class="desktop-chat-container">
                        <div class="chat-widget">

                            <!-- View 1: Contact List -->
                            <div id="chat-contact-list-view" style="display:flex; flex-direction:column; height: 100%;">
                                <div class="chat-widget-header">
                                    <div style="font-size:1.1rem; width:100%; text-align:center;">Pesan</div>
                                </div>
                                <div style="padding: 1rem; border-bottom: 1px solid var(--border-light);">
                                    <input type="text" id="chat-search" placeholder="Cari pengguna..."
                                        style="width:100%; padding:0.6rem 1rem; border-radius: var(--r-full); border:1px solid var(--border-light); outline:none; font-family:inherit; font-size: 0.85rem;">
                                </div>
                                <div id="chat-contacts-container" style="flex:1; overflow-y:auto; background:white;">
                                    <!-- Contacts -->
                                </div>
                            </div>

                            <!-- View 2: Active Chat -->
                            <div id="chat-active-view" style="display:none; flex-direction:column; height: 100%;">
                                <div class="chat-widget-header" style="justify-content:space-between;">
                                    <div style="display:flex; align-items:center; gap:0.5rem;">
                                        <button id="chat-back-btn"
                                            style="border:none; background:transparent; color:white; padding:0; font-size:1.2rem; cursor:pointer;"><i
                                                class="fas fa-arrow-left"></i></button>
                                        <div id="chat-active-avatar"
                                            style="width:36px; height:36px; background:rgba(255,255,255,0.2); border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:700;">
                                            U</div>
                                        <div>
                                            <div id="chat-active-name" style="font-size:0.95rem;">Nama Pengguna</div>
                                            <div id="chat-active-role"
                                                style="font-size:0.7rem; font-weight:normal; opacity:0.8;">Peran</div>
                                        </div>
                                    </div>
                                </div>
                                <div class="chat-messages" id="chat-messages">
                                    <!-- Messages -->
                                </div>
                                <form class="chat-input-area" id="chat-form">
                                    <input type="text" id="chat-input" class="chat-input" placeholder="Ketik pesan...">
                                    <input type="hidden" id="chat-edit-id" value="">
                                    <button type="submit" class="btn btn-primary" id="chat-submit-btn"
                                        style="padding: 0 1.25rem; border-radius: var(--r-full);"><i
                                            class="fas fa-paper-plane"></i></button>
                                    <button type="button" class="btn btn-outline" id="chat-cancel-edit-btn"
                                        style="display:none; padding: 0 1rem; border-radius: var(--r-full);"><i
                                            class="fas fa-times"></i></button>
                                </form>
                            </div>

                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- Mobile overlay -->
    <div id="sidebar-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99;"
        onclick="closeSidebar()"></div>

    <script>
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        document.getElementById('hamburger')?.addEventListener('click', () => {
            sidebar.classList.toggle('open');
            overlay.style.display = sidebar.classList.contains('open') ? 'block' : 'none';
        });
        function closeSidebar() {
            sidebar.classList.remove('open');
            overlay.style.display = 'none';
        }
    </script>
    <script type="module" src="../js/community.js?v=4"></script>
    <script type="module" src="../js/support.js?v=4"></script>
    <script type="module" src="../js/auth.js"></script>
    <script type="module" src="../js/sidebar-profile.js"></script>

    <!-- Mobile Bottom Navigation -->
    <nav class="mobile-nav">
        <ul class="mobile-nav-list">
            <a href="dashboard.html" class="mobile-nav-item" id="mnav-dashboard">
                <i class="fas fa-house"></i>
                Beranda
            </a>
            <a href="support.html" class="mobile-nav-item" id="mnav-messages">
                <i class="fas fa-comments"></i>
                Pesan
            </a>
            <a href="add-kindness.html" class="mobile-nav-item mobile-fab" id="mnav-add">
                <i class="fas fa-plus"></i>
            </a>
            <a href="community.html" class="mobile-nav-item" id="mnav-community">
                <i class="fas fa-users"></i>
                Feed
            </a>
            <a href="profile.html" class="mobile-nav-item" id="mnav-profile">
                <i class="fas fa-user-circle"></i>
                Profil
            </a>
        </ul>
    </nav>

</body>

</html>
